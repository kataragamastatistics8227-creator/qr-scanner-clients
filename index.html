<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:Arial, sans-serif;
margin:0;
text-align:center;
transition:0.4s;
background:#f4f6f9;
}

header{
background:linear-gradient(90deg,#8B0000,#0033A0);
color:white;
padding:15px;
font-weight:bold;
}

.title{
font-size:22px;
}

.subtitle{
font-size:18px;
margin-top:5px;
}

.controls{
display:flex;
justify-content:center;
gap:10px;
margin:10px;
}

select,button{
padding:8px 12px;
border-radius:6px;
border:none;
font-weight:bold;
}

#reader{
width:300px;
margin:auto;
margin-top:10px;
}

#welcome{
font-size:22px;
font-weight:bold;
margin-top:15px;
}

#qr{
font-size:20px;
font-weight:bold;
margin-top:5px;
}

.buttons{
display:flex;
flex-direction:column;
align-items:center;
margin-top:20px;
}

.card{
width:250px;
padding:25px;
margin:10px;
border-radius:14px;
font-size:22px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
box-shadow:0 6px 15px rgba(0,0,0,0.25);
}

.card:hover{
transform:scale(1.08);
}

.emoji{
font-size:50px;
display:block;
margin-bottom:10px;
}

.good{background:#FFD93D;}
.normal{background:#4CAF50;color:white;}
.bad{background:#E53935;color:white;}

.success{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
color:white;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
font-size:28px;
display:none;
animation:fade 0.6s;
}

@keyframes fade{
from{opacity:0;}
to{opacity:1;}
}

.dark{
background:#121212;
color:white;
}

.dark header{
background:linear-gradient(90deg,#550000,#001c60);
}

</style>

</head>

<body>

<header>

<div class="title" id="title"></div>
<div class="subtitle" id="subtitle"></div>

</header>

<div class="controls">

<select id="lang" onchange="setLanguage()">

<option value="en">English</option>
<option value="si">සිංහල</option>
<option value="ta">தமிழ்</option>

</select>

<button onclick="toggleMode()">🌙</button>

</div>

<div id="reader"></div>

<div id="welcome"></div>
<div id="qr"></div>

<div class="buttons" id="buttons" style="display:none">

<div class="card good" onclick="send('GOOD')">
<span class="emoji">😄</span>
<span id="goodText"></span>
</div>

<div class="card normal" onclick="send('NORMAL')">
<span class="emoji">🙂</span>
<span id="normalText"></span>
</div>

<div class="card bad" onclick="send('BAD')">
<span class="emoji">☹️</span>
<span id="badText"></span>
</div>

</div>

<div class="success" id="success">

<div id="successText"></div>
<div style="font-size:70px">✅</div>

</div>

<audio id="beep">
<source src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg">
</audio>

<script>

let qrValue="";

/* LANGUAGE DATA */

const langData={

en:{
title:"DIVISIONAL SECRETARIAT - KATHARAGAMA",
subtitle:"CLIENT MANAGEMENT SYSTEM",
welcome:"WELCOME",
qr:"QR NUMBER",
good:"GOOD",
normal:"NORMAL",
bad:"BAD",
thanks:"THANK YOU FOR YOUR RESPONSE"
},

si:{
title:"ප්‍රාදේශීය ලේකම් කාර්යාලය - කතරගම",
subtitle:"පාරිභෝගික කළමනාකරණ පද්ධතිය",
welcome:"සාදරයෙන් පිළිගනිමු",
qr:"QR අංකය",
good:"හොඳයි",
normal:"සාමාන්‍යයි",
bad:"නරකයි",
thanks:"ඔබගේ ප්‍රතිචාරයට ස්තුතියි"
},

ta:{
title:"பிரதேச செயலகம் - கதிர்காமம்",
subtitle:"வாடிக்கையாளர் மேலாண்மை அமைப்பு",
welcome:"வரவேற்கிறோம்",
qr:"QR எண்",
good:"நன்று",
normal:"சாதாரணம்",
bad:"மோசம்",
thanks:"உங்கள் பதிலுக்கு நன்றி"
}

};

function setLanguage(){

let l=document.getElementById("lang").value;
let t=langData[l];

title.innerText=t.title;
subtitle.innerText=t.subtitle;
goodText.innerText=t.good;
normalText.innerText=t.normal;
badText.innerText=t.bad;

}

setLanguage();

/* QR SCAN */

function onScanSuccess(decodedText){

document.getElementById("beep").play();

document.getElementById("reader").style.display="none";

let parts = decodedText.split("/");
qrValue = parts[parts.length-1];

let l=document.getElementById("lang").value;
let t=langData[l];

welcome.innerHTML=t.welcome;
qr.innerHTML=t.qr+" : "+qrValue;

document.getElementById("buttons").style.display="flex";

}

var html5QrcodeScanner = new Html5QrcodeScanner(
"reader",
{ fps: 10, qrbox: 250 });

html5QrcodeScanner.render(onScanSuccess);

/* SAVE RESPONSE */

function send(res){

let l=document.getElementById("lang").value;
let t=langData[l];

google.script.run.withSuccessHandler(function(){

document.getElementById("success").style.display="flex";
document.getElementById("successText").innerText=t.thanks;

setTimeout(function(){

document.getElementById("success").style.display="none";

buttons.style.display="none";
reader.style.display="block";
welcome.innerHTML="";
qr.innerHTML="";

html5QrcodeScanner.clear();

html5QrcodeScanner = new Html5QrcodeScanner(
"reader",
{ fps:10, qrbox:250 });

html5QrcodeScanner.render(onScanSuccess);

},2000);

}).saveResponse(qrValue,res);

}

/* DARK MODE */

function toggleMode(){
document.body.classList.toggle("dark");
}

/* FULLSCREEN MOBILE */

document.addEventListener("click",function(){

let elem=document.documentElement;

if(elem.requestFullscreen){
elem.requestFullscreen();
}

fetch("https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec", {
  method: "POST",
  body: JSON.stringify({
    qr: scannedCode
  })
});

</script>

</body>

</html>
